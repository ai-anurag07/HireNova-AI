version: '3.8'

services:
  # 1. PostgreSQL (Relational Database for Users & Jobs)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jobagent
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: jobagent_db
    ports:
      - "5432:5432"

  # 2. Redis (For Caching and Task Queues)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 3. MinIO (Free File Storage for Resumes and PDFs)
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Web Dashboard port